<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Formulario para validar las funciones</h1>
        <p class="subtitulo">Completa tus datos</p>

        <form id="formularioRegistro" onsubmit="procesarRegistro(event)">
            
            <div class="grupo-formulario">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
            </div>

            <div class="grupo-formulario">
                <label for="correo">Correo electrónico:</label>
                <input type="text" id="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="grupo-formulario">
                <label for="telefono">Teléfono (10 dígitos):</label>
                <input type="number" id="telefono" placeholder="9511234567" maxlength="10" onblur="aplicarFormatoTelefono()">
            </div>

            <div class="grupo-formulario">
                <label for="fechaNacimiento">Fecha de nacimiento:</label>
                <input type="date" id="fechaNacimiento">
            </div>

            <div class="grupo-doble">
                <div class="grupo-formulario">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                </div>
                <div class="grupo-formulario">
                    <label for="confirmarPassword">Confirmar contraseña:</label>
                    <input type="password" id="confirmarPassword" placeholder="Repite tu contraseña">
                </div>
            </div>

            <button type="submit" class="boton-enviar">Registrarse</button>
        </form>

        <p class="enlace-login">Ve al <a href="login.html">Login</a></p>
    </div>

    <div id="ventanaModal" class="modal">
        <div class="contenido-modal">
            <h2>Validación de Edad</h2>
            <p id="mensajeEdad"></p>
            <button type="button" class="boton-cerrar" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script src="js/utileria.js"></script>

    <script src="js/index.js"></script>
        
    
</body>
</html>
