<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Login</h1>
        <p class="subtitulo">Validacion de correo y contraseña</p>

        <form id="formularioLogin" onsubmit="procesarLogin(event)">
            
            <div class="grupo-formulario">
                <label for="correoLogin">Correo electrónico:</label>
                <input type="text" id="correoLogin" placeholder="ejemplo@correo.com">
            </div>

            <div class="grupo-formulario">
                <label for="passwordLogin">Contraseña:</label>
                <input type="password" id="passwordLogin" placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="boton-enviar">Entrar</button>
        </form>

        <p class="enlace-login">Ve al <a href="index.html">Formulario</a></p>
    </div>

    <script src="js/utileria.js"></script>
    
    <script src="js/login.js"></script>
</body>
</html>
